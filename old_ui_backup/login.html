<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HealthCare</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-container {
            background-color: var(--card-bg, #ffffff);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        body.dark .login-container {
            background-color: var(--card-bg, #222);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .login-title {
            margin-bottom: 2rem;
            color: var(--text-color, #333);
        }
        body.dark .login-title {
            color: var(--text-color, #eee);
        }
        .login-container form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .login-container input {
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        body.dark .login-container input {
            background-color: #333;
            border: 1px solid #444;
            color: #eee;
        }
        .login-container button {
            padding: 1rem;
            background-color: #0070f3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .login-container button:hover {
            background-color: #005bb5;
        }
        .error-message {
            color: #d9534f;
            background: #fdf7f7;
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid #d9534f;
        }
        body.dark .error-message {
            background: #4a1919;
            color: #ffb3b3;
            border-color: #a83d3d;
        }
    </style>
</head>
<body>
<header class="navbar">
    <div class="nav-inner">
        <a href="/" class="logo">Health<span>Care</span></a>
        <ul class="nav-links">
            <li><a href="/" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="servives.html" class="nav-link">Services</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
        <button class="dark-toggle" onclick="document.body.classList.toggle('dark')">🌙</button>
    </div>
</header>
<section class="login-wrap">
    <div class="login-container">
        <h2 class="login-title">Admin Login</h2>
        <p class="error-message" id="error-message" style="display: none;">Invalid username or password.</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</section>
<script>
    if (new URLSearchParams(window.location.search).get('error') === '1') {
        document.getElementById('error-message').style.display = 'block';
    }
</script>
</body>
</html>
